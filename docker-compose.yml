version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: personal_rag_db
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal_rag_api
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: rag
      DB_USER: rag
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:

